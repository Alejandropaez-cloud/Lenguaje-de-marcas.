<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pasteleria Honore | Calculadora PVP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --honore-cream: #fff7ed;
            --honore-gold: #f59e0b;
            --honore-brown: #7c2d12;
        }

        body {
            background: linear-gradient(135deg, #fffaf2, var(--honore-cream));
            color: #2b2b2b;
        }

        .brand-title {
            color: var(--honore-brown);
            letter-spacing: 0.04em;
        }

        .card {
            border: 0;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            border-radius: 1rem;
        }

        .badge-price {
            background: var(--honore-gold);
            color: #111827;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <main class="container py-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9">
                <div class="card p-4 p-md-5">

                    <div class="d-flex flex-wrap justify-content-betweenalign-items-center gap-3 mb-4">
                        <div>
                            <h1 class="h3 mb-1 brand-title">Pasteleria Honore</h1>
                            <p class="mb-0 text-secondary">Calculadora de PVP de tartas
                                personalizadas</p>
                        </div>
                        <span class="badge rounded-pill badge-price fs-6">35 EUR/kg
                            base</span>
                    </div>
                    <form id="cakeForm" class="row g-3">
                        <div class="col-md-4">
                            <label for="kilos" class="form-label">Peso de la tarta
                                (kg)</label>
                            <input type="number" class="form-control" id="kilos" min="0.5" step="0.5" value="1"
                                required>
                        </div>
                        <div class="col-md-8">
                            <label class="form-label d-block">Ingredientes (suplemento
                                por kg)</label>
                            <div class="row g-2">
                                <div class="col-sm-6">
                                    <div class="form-check">
                                        <input class="form-check-input ingredient" type="checkbox" id="chocolate"
                                            data-extra="4">
                                        <label class="form-check-label" for="chocolate">Chocolate (+4 EUR/kg)</label>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-check">
                                        <input class="form-check-input ingredient" type="checkbox" id="frutosRojos"
                                            data-extra="5">
                                        <label class="form-check-label" for="frutosRojos">Frutos rojos (+5
                                            EUR/kg)</label>
                                    </div>
                                </div>
                                <div class="col-sm-6">

                                    <div class="form-check">
                                        <input class="form-check-input ingredient" type="checkbox" id="frutosSecos"
                                            data-extra="6">
                                        <label class="form-check-label" for="frutosSecos">Frutos secos (+6
                                            EUR/kg)</label>
                                    </div>
                                </div>
                                <div class="col-sm-6">
                                    <div class="form-check">
                                        <input class="form-check-input ingredient" type="checkbox" id="cremaPastelera"
                                            data-extra="3">
                                        <label class="form-check-label" for="cremaPastelera">Crema pastelera (+3
                                            EUR/kg)</label>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="ingredientesEco">
                                <label class="form-check-label" for="ingredientesEco">Ingredientes eco (+10%)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="vegana">
                                <label class="form-check-label" for="vegana">Tarta vegana
                                    (+10%)</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" id="customizacion">
                                <label class="form-check-label" for="customizacion">Customizacion tematica (+25
                                    EUR)</label>
                            </div>
                        </div>
                        <div class="col-md-6">

                            <label for="entrega" class="form-label">Entrega</label>
                            <select id="entrega" class="form-select">
                                <option value="0">Recogida en tienda (0 EUR)</option>
                                <option value="10">Domicilio en Estepona (10 EUR)</option>
                                <option value="20">Domicilio radio 15 km (20 EUR)</option>
                            </select>
                        </div>
                        <div class="col-12 d-flex gap-2">
                            <button id="Calcular" class="btn btn-dark">Calcular
                                PVP</button>
                            <button type="button" id="resetBtn" class="btnbtn-outline-secondary">Limpiar</button>
                        </div>
                    </form>
                    <hr class="my-4">
                    <section aria-live="polite">
                        <h2 class="h5 mb-3">Desglose</h2>
                        <ul class="list-group mb-3">
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Base (35 EUR x kg)</span>
                                <strong id="baseOut">35.00 EUR</strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Ingredientes</span>
                                <strong id="ingredientesOut">0.00 EUR</strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Incremento eco (+10%)</span>
                                <strong id="ecoOut">0.00 EUR</strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Incremento vegana (+10%)</span>
                                <strong id="veganaOut">0.00 EUR</strong>
                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Customizacion</span>
                                <strong id="customOut">0.00 EUR</strong>

                            </li>
                            <li class="list-group-item d-flex justify-content-between">
                                <span>Entrega</span>
                                <strong id="entregaOut">0.00 EUR</strong>
                            </li>
                        </ul>
                        <div class="alert alert-warning d-flex justify-content-betweenalign-items-center mb-0" role="status">
                            <span class="fw-semibold">PVP final</span>
                            <span class="fs-4 fw-bold" id="totalOut">35.00 EUR</span>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>

    <script>
        const PRECIO_BASE = 35;
        const INCREMENTO_ECO = 1.10;
        const TARTA_VEGANA = 1.10;
        const CUSTOMIZACION_TEMATICA = 1.25;
        const PRECIO_CHOCOLATE = 4;
        const PRECIO_FRUTOS_SECOS = 6;
        const PRECIO_FRUTOS_ROJOS = 5;
        const PRECIO_CREMA_PASTELERA = 3;
        const PRECIO_RECOGIDA_DOMICILIO = 10;
        const PRECIO_RECOGIDA_RADIO = 20;

        function Calcular(){
            let peso = document.getElementById(peso.textContent)    // La variable peso sera el peso de la tarta que la multiplicaremos por el precio base.
            totalCompra = peso * PRECIO_BASE ;  // Esta sera la operacion principal para calcular el precio total de la pagina web.       
            document.getElementById("PVP final").innerHTML = totalCompra + " EUR"
        }
        document.getElementById("Calcular").addEventListener("click", Calcular, false)
    </script>
</body>

</html>
